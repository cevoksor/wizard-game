<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wizard Dungeon</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #000; font-family: sans-serif; color: #fff; user-select: none; }
    canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; cursor: crosshair; }
    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; background: #1a1a1a; z-index: 50; }

    #hud {
      position: fixed; top: 12px; left: 12px;
      pointer-events: none; z-index: 5;
      font-size: 18px; text-shadow: 1px 1px 0 #000, 0 0 4px #000;
    }
    .hud-row {
      display: inline-flex; gap: 12px; align-items: center;
      padding: 8px 14px;
      background: rgba(0,0,0,0.45);
      border-radius: 6px;
    }
    .hud-label { opacity: 0.85; font-size: 14px; }
    .hud-sep   { width: 1px; height: 20px; background: rgba(255,255,255,0.25); }
    #hud-hp { color: #ff5e6e; letter-spacing: 1px; }
    #hud-coins { color: #f5d76e; }
    .hud-bar {
      width: 90px; height: 12px;
      background: rgba(255,255,255,0.15);
      border-radius: 6px; overflow: hidden;
    }
    #hud-stamina-fill {
      height: 100%; width: 100%;
      background: linear-gradient(to right, #5fdcff, #6e8eff);
      transition: width 0.08s linear;
    }
    #hud-stamina-fill.empty { background: #555; }

    #hud-msg {
      position: fixed; top: 32%; left: 50%; transform: translate(-50%, -50%);
      padding: 14px 28px; background: rgba(0,0,0,0.78);
      border: 2px solid #f5d76e; border-radius: 8px;
      color: #fff; font-size: 22px; opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease; z-index: 6; text-align: center;
    }
    #hud-msg.visible { opacity: 1; }

    #hud-controls {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      font-size: 13px; opacity: 0.6; padding: 4px 10px;
      background: rgba(0,0,0,0.4); border-radius: 4px;
      pointer-events: none;
    }

    #shop {
      position: fixed; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.7); z-index: 20;
    }
    #shop.visible { display: flex; }
    .shop-box {
      background: #2a1f3a; color: #fff;
      border: 3px solid #f5d76e;
      padding: 24px 28px; border-radius: 10px;
      min-width: 380px; max-width: 480px;
    }
    .shop-box h2 { margin: 0 0 4px 0; color: #f5d76e; }
    .shop-box ul { list-style: none; padding: 0; margin: 16px 0; }
    .shop-box li {
      padding: 12px; margin: 6px 0;
      background: rgba(255,255,255,0.06); border-radius: 6px;
      cursor: pointer; transition: background 0.15s;
    }
    .shop-box li:hover { background: rgba(245, 215, 110, 0.15); }
    .shop-box .price { float: right; color: #f5d76e; font-weight: bold; }
    #shop-close {
      width: 100%; padding: 10px; margin-top: 8px;
      background: #4a3a6e; color: white; border: none; border-radius: 6px;
      cursor: pointer; font-size: 15px;
    }
    #shop-close:hover { background: #5a4a8e; }

    #win-screen {
      position: fixed; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85); z-index: 30; color: #f5d76e;
      font-size: 32px; text-align: center; flex-direction: column;
    }
    #win-screen.visible { display: flex; }
    #win-screen .sub { color: #fff; font-size: 18px; margin-top: 12px; opacity: 0.85; }
  </style>
</head>
<body>
  <div id="loading">Připravuji magický vír...</div>
  <canvas id="game"></canvas>
  <script type="module" src="src/main.js"></script>
</body>
</html>
